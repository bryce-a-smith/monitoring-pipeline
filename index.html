<!DOCTYPE html>
<html lang="en">

        <h1>Alden B. Smith</h1>

            <ul>

    <main>
        <h2>Application Status</h2>

        <h3><span class="label">Current Environment:</span> <span id="environment"></span></h3>

        <p>Current Application Status: <strong class="status-ok"">Green</strong> </p>
        <!-- Added a paragraph to display the last updated date with an ID for dynamic content -->
        <p> Last Updated: <strong id="date-last-updated"></strong></p>
        <!-- Added a notes section with a class for styling -->
        <p class="notes"> Notes: <em>All systems operational. No issues detected.</em></p>
